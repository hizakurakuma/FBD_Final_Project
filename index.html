<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>進度說明</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f7efe5, #f3d8c7);
      font-family: "Microsoft JhengHei", "PingFang TC", "Heiti TC", "Noto Sans TC", sans-serif;
      color: #3b2f2f;
    }

    .card {
      width: min(88vw, 760px);
      padding: 56px 64px;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 28px;
      box-shadow: 0 20px 50px rgba(90, 55, 35, 0.18);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .title {
      font-size: 40px;
      font-weight: 800;
      margin-bottom: 28px;
      letter-spacing: 1px;
      color: #7a4f3a;
    }

    .content {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.9;
      letter-spacing: 0.5px;
    }

    .thanks {
      margin-top: 32px;
      font-size: 28px;
      font-weight: 800;
      color: #9a5f43;
    }

    .decor {
      width: 64px;
      height: 5px;
      margin: 0 auto 32px;
      border-radius: 999px;
      background: #c98f6a;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="title">快做好了!</div>
    <div class="decor"></div>

    <div class="content">
      現在剩報告文字敘述和排版，<br />
      7/7深夜～7/8中午之前應該可以做完
    </div>

    <div class="thanks">
      非常謝謝老師的包容
    </div>
  </main>
</body>
</html>
